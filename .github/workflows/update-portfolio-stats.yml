name: Update Portfolio Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "18 5 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh Scholar cache
        run: node scripts/update-scholar-cache.js
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Refresh public profile cache
        run: node scripts/update-profile-cache.js

      - name: Commit cache update
        run: |
          if git diff --quiet -- assets/scholar-stats.json assets/profile-stats.json; then
            echo "Stats caches unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/scholar-stats.json assets/profile-stats.json
          git commit -m "Update portfolio stats cache"
          git push
